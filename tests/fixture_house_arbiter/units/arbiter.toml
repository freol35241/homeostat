schema = 1

[unit]
name = "arbiter"
kind = "service"
description = "Arbiter under test"

[runtime]
command = "uv run ../../adapters/arbiter.py"
restart = "always"
shutdown_grace_s = 5

[bus.subscribes]
cmd = "home/cmd/**"

[bus.publishes]
arbiter = { key = "home/arbiter/**" }

[params.hold_minutes]
type = "float"
default = 30
editable_by = "family"

[naming]
sv = "skiljedomare"
en = "arbiter"
aliases = []
