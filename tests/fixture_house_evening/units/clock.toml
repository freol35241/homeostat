schema = 1

[unit]
name = "clock"
kind = "service"
description = "Civil time on the bus"

[runtime]
command = "uv run ../../adapters/clock.py"
restart = "always"
shutdown_grace_s = 5

[bus.publishes]
minute = { key = "home/clock/minute" }
date = { key = "home/clock/date" }

[params.timezone]
type = "string"
default = "Europe/Stockholm"
editable_by = "owner"
