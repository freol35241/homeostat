schema = 1

[unit]
name = "hue"
kind = "adapter"

[runtime]
command = "uv run units/hue.py"
restart = "always"

[discovery]
mode = "static"
endpoint = "http://localhost:8080"

[bus.publishes]
state = { key = "home/state/{room}/{entity}/**" }

[bus.subscribes]
commands = "home/cmd/{room}/{entity}/**"

[entities]
dir = "entities/hue/"
