schema = 1

[unit]
name = "dimmer"
kind = "automation"

[runtime]
command = "uv run units/dimmer.py"
restart = "on-failure"

[bus.subscribes]
clock = "home/clock/minute"

[params.brightness]
type = "int"
default = 50
constraint = { min = 0, max = 10 }
editable_by = "family"

[params.off_time]
type = "time"
default = "12:00"
constraint = { after = "20:00", before = "02:00" }
editable_by = "family"
