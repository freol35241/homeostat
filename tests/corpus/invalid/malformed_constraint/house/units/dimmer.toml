schema = 1

[unit]
name = "dimmer"
kind = "automation"

[runtime]
command = "uv run units/dimmer.py"
restart = "on-failure"

[bus.subscribes]
clock = "home/clock/minute"

[params.brightness]
type = "int"
default = 50
constraint = { min = 100, max = 10 }
editable_by = "family"

[params.level]
type = "int"
default = 5
constraint = { after = "20:00" }
editable_by = "family"
