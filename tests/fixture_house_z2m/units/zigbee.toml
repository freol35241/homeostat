schema = 1

[unit]
name = "zigbee"
kind = "adapter"
description = "Zigbee2MQTT adapter under test"

[runtime]
command = "uv run ../../adapters/zigbee2mqtt.py"
restart = "always"
shutdown_grace_s = 5

[discovery]
mode = "static"
endpoint = "mqtt://127.0.0.1:${HOMEOSTAT_TEST_MQTT_PORT}"

[bus.publishes]
state = { key = "home/state/{room}/{entity}/**" }
discovery = { key = "home/discovery/zigbee" }

[bus.subscribes]
commands = "home/cmd/{room}/{entity}/**"

[entities]
dir = "entities/zigbee/"
