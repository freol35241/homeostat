schema = 1

[unit]
name = "onvif"
kind = "adapter"
description = "ONVIF camera adapter under test"

[runtime]
command = "uv run ../../adapters/onvif.py"
restart = "always"
shutdown_grace_s = 5

[discovery]
mode = "mdns"
service = "_onvif._tcp"

[bus.publishes]
state = { key = "home/state/{room}/{entity}/**" }

[entities]
dir = "entities/onvif/"
