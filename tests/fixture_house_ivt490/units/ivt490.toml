schema = 1

[unit]
name = "ivt490"
kind = "adapter"
description = "IVT490 heat-pump adapter under test"

[runtime]
command = "uv run ../../adapters/ivt490.py"
restart = "always"
shutdown_grace_s = 5

[discovery]
mode = "static"
endpoint = "mqtt://127.0.0.1:${HOMEOSTAT_TEST_MQTT_PORT}"

[bus.publishes]
state = { key = "home/state/{room}/{entity}/**" }
discovery = { key = "home/discovery/ivt490" }

[bus.subscribes]
commands = "home/cmd/{room}/{entity}/**"
arbiter_commands = "home/arbiter/{room}/{entity}/**"

[entities]
dir = "entities/ivt490/"
