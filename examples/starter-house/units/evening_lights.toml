schema = 1

[unit]
name = "evening_lights"
kind = "automation"
description = "Turns downstairs lights off after off_time when nobody is present"

[runtime]
command = "uv run units/evening_lights.py"
restart = "on-failure"
shutdown_grace_s = 5

[bus.subscribes]
# Zigbee2MQTT motion sensors publish their `occupancy` field as the aspect.
presence = "home/state/downstairs/*/occupancy"
light_state = "home/state/downstairs/*/on"
clock = "home/clock/minute"

[bus.publishes]
lights = { key = "home/cmd/downstairs/*/on", capability = "light", priority = "automation" }

[params.off_time]
type = "time"
default = "22:00"
constraint = { after = "20:00", before = "02:00" }
editable_by = "family"

[naming]
sv = "kvällsbelysning"
en = "evening lights"
aliases = []
room = "downstairs"
