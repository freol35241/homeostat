# Two listeners, two trust levels (per_listener_settings makes them
# independent):
#
# 1883 — inside the compose network only (no ports: mapping publishes
# it). Anonymous, full access: zigbee2mqtt and the homeostat adapters
# already live inside the trust boundary.
#
# 1884 — published to the LAN for devices that cannot join a VPN (the
# IVT490 heat-pump interface) and for OwnTracks phones. Authenticated,
# and every credential is scoped by the ACL to its own topic tree, so a
# leaked device password's blast radius is that device's dialect —
# never zigbee2mqtt/#.
#
# The password file starts empty (nobody can connect) and stays out of
# your house repo; add users with mosquitto_passwd — see the README.

per_listener_settings true

listener 1883
listener_allow_anonymous true

listener 1884
listener_allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
