schema = 1

[entity]
# The device's own MQTT base topic, as configured on the ESP8266 interface
# board (MQTT_BASE_TOPIC) — not a topic segment under a shared root, unlike
# Zigbee2MQTT: each IVT490 interface owns its whole topic tree.
id = "ivt490"
capability = "climate"
features = []
room = "utility"

[naming]
sv = "värmepumpen"
en = "heat pump"
aliases = []

[write_policy]
mode = "arbitrated"
owner = "ivt490"
