schema = 1

[unit]
name = "evening_lights"
kind = "automation"
description = "Dims and turns off downstairs lights at night"

[runtime]
command = "uv run units/evening_lights.py"
restart = "on-failure"
shutdown_grace_s = 5

[bus.subscribes]
presence = "home/state/downstairs/**/presence"
clock = "home/clock/minute"

[bus.publishes]
lights = { key = "home/cmd/downstairs/**/light", capability = "light", priority = "automation" }

[params.off_time]
type = "time"
default = "23:00"
constraint = { after = "20:00", before = "02:00" }
editable_by = "family"

[naming]
sv = "kvällsbelysning"
en = "evening lights"
aliases = []
room = "downstairs"
