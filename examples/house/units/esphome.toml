schema = 1

[unit]
name = "esphome"
kind = "adapter"
description = "ESPHome native-API adapter"

[runtime]
command = "uv run units/esphome.py"
restart = "always"

[discovery]
mode = "mdns"
service = "_esphomelib._tcp"

[bus.publishes]
state = { key = "home/state/{room}/{entity}/**" }

[bus.subscribes]
commands = "home/cmd/{room}/{entity}/**"

[entities]
dir = "entities/esphome/"
