name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Native builds on both architectures — no cross toolchain, no QEMU.
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --bin homeostat
      - name: Package
        run: |
          tar czf "homeostat-$GITHUB_REF_NAME-${{ matrix.target }}.tar.gz" \
            -C target/release homeostat \
            -C "$GITHUB_WORKSPACE" LICENSE README.md
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: homeostat-*.tar.gz

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # QEMU only emulates the runtime stage's apt/uv steps; the Rust
      # builder stage cross-compiles natively (see Dockerfile).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [binaries, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" homeostat-*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Container image: \`docker pull ghcr.io/$GITHUB_REPOSITORY:${GITHUB_REF_NAME#v}\`"
