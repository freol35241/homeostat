name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            sdk/python/pyproject.toml
            adapters/*.py
            tests/fixture_house_evening/units/*.py
            tests/fixture_house_apply/units/*.py
      - name: Install mosquitto
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mosquitto
      # First-run dependency resolution must not eat into test timeouts.
      - name: Pre-warm the Python units' uv environments
        run: |
          uv sync --script adapters/zigbee2mqtt.py
          uv sync --script adapters/clock.py
          uv sync --script adapters/recorder.py
          uv sync --script tests/fixture_house_evening/units/evening_lights.py
          uv sync --script tests/fixture_house_apply/units/probe.py
      - run: cargo test

  # The container image is packaging, not logic: build it and smoke-test
  # that the supervisor boots a real house inside it. See
  # scripts/smoke_image.sh for what the smoke test asserts.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: homeostat:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: scripts/smoke_image.sh homeostat:smoke
